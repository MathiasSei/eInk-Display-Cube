[platformio]
# Pull in the gitignored configuration file
extra_configs = secret_flags.ini

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    zinggjm/GxEPD2@^1.5.2

build_flags =
    # Inject the flags pulled from secret_flags.ini
    ${secrets.build_flags}
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1