name: Compile and Release Firmware

on:
  push:
    branches:
      - main # Triggers instantly whenever you push code to the main branch

# 👇 CRITICAL FIX: Grant permissions to create and write releases
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install PlatformIO
      run: pip install platformio

    - name: Compile Firmware with Dynamic Version and Secrets
      run: pio run
      env:
        FIRMWARE_VERSION: "v${{ github.run_number }}"
        WIFI_SSID: "${{ secrets.WIFI_SSID }}"
        WIFI_PASS: "${{ secrets.WIFI_PASS }}"
        AWS_API_KEY: "${{ secrets.AWS_API_KEY }}"

    - name: Generate Version Text File
      run: |
        mkdir -p .pio/build/esp32-c3-devkitm-1
        echo "v${{ github.run_number }}" > .pio/build/esp32-c3-devkitm-1/version.txt

    - name: Create Continuous Release and Upload Binary
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Continuous Build v${{ github.run_number }}
        files: |
          .pio/build/esp32-c3-devkitm-1/firmware.bin
          .pio/build/esp32-c3-devkitm-1/version.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}